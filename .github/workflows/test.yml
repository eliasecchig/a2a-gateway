name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check gateway/ samples/ tests/
          uv run ruff format --check gateway/ samples/ tests/

      - name: Type check
        run: uv run ty check gateway/ samples/

      - name: Spell check
        run: uv run codespell gateway/ samples/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v
