name: Live Telegram

on:
  workflow_dispatch:

jobs:
  telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run live Telegram tests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TEST_CHAT: ${{ secrets.TELEGRAM_TEST_CHAT }}
        run: uv run pytest -m live tests/live/test_telegram_live.py -v
